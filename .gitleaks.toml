# .gitleaks.toml - Agent-Reach custom secret patterns
# Uses Go RE2 regex

title = "Agent-Reach Secret Scan Config"

[[rules]]
id          = "twitter-auth-token"
description = "Twitter/X auth_token"
regex       = 'auth_token[ ]*[=:][ ]*[a-f0-9]{32,80}'
tags        = ["twitter", "critical"]

[[rules]]
id          = "twitter-ct0"
description = "Twitter/X ct0 CSRF token"
regex       = 'ct0[ ]*[=:][ ]*[a-f0-9]{32,160}'
tags        = ["twitter", "critical"]

[[rules]]
id          = "apollo-api-key"
description = "Apollo.io API key"
regex       = 'apo_[a-zA-Z0-9]{24,}'
tags        = ["apollo", "high"]

[[rules]]
id          = "exa-api-key"
description = "Exa AI API key"
regex       = 'exa-[a-zA-Z0-9]{32,}'
tags        = ["exa", "medium"]

[[rules]]
id          = "groq-api-key"
description = "Groq API key"
regex       = 'gsk_[a-zA-Z0-9]{48,}'
tags        = ["groq", "medium"]

[allowlist]
description = "Safe placeholder values"
regexes = ["your_api_key_here", "REPLACE_ME", "placeholder", "redacted"]
paths   = [".git", "node_modules", "uv.lock", "package-lock.json"]
