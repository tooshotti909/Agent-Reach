name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Record start time
        run: echo "CI_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e .[dev]

      - name: Run tests
        run: |
          pytest -q

      - name: Report elapsed time
        if: always()
        run: |
          END=$(date +%s)
          ELAPSED=$((END - CI_START))
          echo "::notice::Python ${{ matrix.python-version }} tests completed in ${ELAPSED}s"
          echo "| Python ${{ matrix.python-version }} | ${ELAPSED}s |" >> "$GITHUB_STEP_SUMMARY"
