name: Secret Scanning

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record start time
        run: echo "SCAN_START=$(date +%s)" >> "$GITHUB_ENV"
      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Fail on findings
        if: steps.gitleaks.outputs.exit-code != '0'
        run: |
          echo "::error::Gitleaks detected secrets. Revoke and rotate immediately."
          exit 1

  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # On push/PR: scan only the changed commits (base → HEAD).
      # On schedule/workflow_dispatch: scan the entire repo history (no base/head).
      - name: TruffleHog (push / pull_request)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
      - name: TruffleHog (schedule / workflow_dispatch — full scan)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  custom-patterns:
    name: Custom Pattern Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record start time
        run: echo "SCAN_START=$(date +%s)" >> "$GITHUB_ENV"
      - name: Scan custom patterns
        run: |
          set +e
          FOUND=0

          # Patterns that look like real secrets (prefix-anchored to real token formats)
          # auth_token and ct0 are variable *names*, not secrets — skip them.
          # Only flag values that look like actual tokens (long hex/alphanumeric strings).
          declare -a patterns=(
            "exa-[a-zA-Z0-9]{20,}"
            "gsk_[a-zA-Z0-9]{20,}"
            "ghp_[a-zA-Z0-9]{36,}"
            "github_pat_[a-zA-Z0-9_]{36,}"
            "-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----"
          )

          # Strings that indicate the match is safe (example values, docs, test fixtures)
          SAFE="example|placeholder|your_key_here|REPLACE_ME|redacted|REDACTED|test_token|\
          xxx|yyy|dummy|fake|mock|sample|<|>|\$\{|\$ENV|os\.environ|config\.get|\
          auth_token.*=.*['\"]?\s*$|# |docstring|\.py:|\.md:|\.rst:"

          for p in "${patterns[@]}"; do
            # Search only added lines (lines starting with +) in the full diff,
            # excluding diff headers (+++ a/...)
            r=$(git log --all -p | grep -E "^\+" | grep -v "^+++" | grep -E "$p" | grep -vE "$SAFE" 2>/dev/null | head -3)
            if [ -n "$r" ]; then
              FOUND=1
              echo "::warning::Matched pattern: $p"
              echo "$r" | head -3
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "::error::Potential secrets found in git history. Check warnings above."
            exit 1
          fi
          echo "Custom scan passed."

      - name: Report elapsed time
        if: always()
        run: |
          END=$(date +%s)
          ELAPSED=$((END - SCAN_START))
          echo "::notice::Custom pattern scan completed in ${ELAPSED}s"

  summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, trufflehog, custom-patterns]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "| Scanner | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${{ needs.gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TruffleHog | ${{ needs.trufflehog.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Custom Patterns | ${{ needs.custom-patterns.result }} |" >> $GITHUB_STEP_SUMMARY
      - name: Fail if any scanner failed
        if: needs.gitleaks.result == 'failure' || needs.trufflehog.result == 'failure' || needs.custom-patterns.result == 'failure'
        run: exit 1
