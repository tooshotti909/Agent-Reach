# ─────────────────────────────────────────────────────────────────────────────
# secret-scan.yml
# Automated credential & secret scanning for every push and pull request.
# Scans with TWO tools for maximum coverage:
#   1. Gitleaks  — fast regex + entropy detection (400+ built-in rules)
#   2. TruffleHog — deep git history scan with verified secret detection
#
# Setup instructions:
#   1. Copy this file to .github/workflows/secret-scan.yml in your repo
#   2. (Optional) Add a .gitleaks.toml config file to the repo root
#   3. Enable email notifications in GitHub:
#      Settings > Notifications > Actions > check "Email" for failures
#   4. Enable GitHub Secret Scanning (free for public repos, requires
#      GitHub Advanced Security for private):
#      Repo > Settings > Security > Secret scanning > Enable
#
# On detection:
#   - The workflow will FAIL (red X on the commit)
#   - GitHub sends you an email immediately
#   - A detailed report is uploaded as a workflow artifact
#   - Revoke the exposed credential BEFORE merging or pushing anything else
# ─────────────────────────────────────────────────────────────────────────────

name: Secret Scanning

on:
  push:
    branches: ["**"]          # Every branch, every push
  pull_request:
    branches: ["**"]          # Every PR
  schedule:
    - cron: "0 6 * * *"      # Daily full scan — every day at 6 AM UTC
  workflow_dispatch:           # Manual trigger from GitHub UI

permissions:
  contents: read               # Least privilege — read only
  security-events: write       # Required to upload SARIF results

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: Gitleaks — fast scan of current commit diff
  # ───────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Full git history — catches secrets in old commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}   # Optional: for org-level features
        with:
          args: >
            detect
            --source .
            --report-format sarif
            --report-path gitleaks-results.sarif
            --redact
            --verbose
            --exit-code 1

      - name: Upload Gitleaks SARIF to GitHub Security tab
        if: always()           # Upload even on failure so you can see findings
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Upload Gitleaks report as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report-${{ github.sha }}
          path: gitleaks-results.sarif
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: TruffleHog — verified secret detection with entropy analysis
  # ───────────────────────────────────────────────────────────────────────────
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: >
            --only-verified
            --json
            --concurrency 4

      - name: Upload TruffleHog results as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report-${{ github.sha }}
          path: trufflehog-results.json
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3: Custom pattern scan — catches YOUR specific secret formats
  # Covers: auth_token, ct0, Apollo key, Exa key, Groq key, GitHub PAT
  # ───────────────────────────────────────────────────────────────────────────
  custom-patterns:
    name: Custom Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for custom secret patterns
        id: custom_scan
        run: |
          set +e   # Don't exit on grep non-match
          FOUND=0
          REPORT=""

          patterns=(
            "auth_token"
            "ct0"
            "TWITTER_AUTH"
            "apo_[a-zA-Z0-9]"
            "exa-[a-zA-Z0-9]"
            "gsk_[a-zA-Z0-9]"
            "ghp_[a-zA-Z0-9]"
            "github_pat_"
            "APOLLO_API_KEY"
            "EXA_API_KEY"
            "GROQ_API_KEY"
            "password\s*[:=]\s*['\"][^'\"]{8}"
            "secret\s*[:=]\s*['\"][^'\"]{8}"
            "token\s*[:=]\s*['\"][^'\"]{16}"
            "api_key\s*[:=]\s*['\"][^'\"]{8}"
            "-----BEGIN.*PRIVATE KEY-----"
          )

          for pattern in "${patterns[@]}"; do
            result=$(git log --all -p | grep -E "$pattern" | grep -v "^-\-\-\|^+++\|example\|placeholder\|your_key_here\|REPLACE_ME\|redacted" 2>/dev/null)
            if [ -n "$result" ]; then
              FOUND=1
              REPORT="${REPORT}\n[MATCH] Pattern: ${pattern}\n$(echo "$result" | head -3 | sed 's/./*/g' | head -c 100)...[redacted]\n"
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "::error::Potential secrets detected by custom pattern scan. See job summary."
            echo -e "$REPORT" >> $GITHUB_STEP_SUMMARY
            echo "::notice::Revoke and rotate any exposed credentials immediately."
            exit 1
          else
            echo "No custom pattern matches found."
            echo "Custom pattern scan passed — no matches." >> $GITHUB_STEP_SUMMARY
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4: Summary — post a consolidated status to PR / commit
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, trufflehog, custom-patterns]
    if: always()
    steps:
      - name: Post scan result summary
        run: |
          echo "## Secret Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${{ needs.gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TruffleHog | ${{ needs.trufflehog.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Custom Patterns | ${{ needs.custom-patterns.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**If any scanner failed:** revoke the exposed credential immediately before pushing any fixes." >> $GITHUB_STEP_SUMMARY

      - name: Fail if any scanner failed
        if: |
          needs.gitleaks.result == 'failure' ||
          needs.trufflehog.result == 'failure' ||
          needs.custom-patterns.result == 'failure'
        run: |
          echo "::error::One or more secret scanners detected sensitive data. The push is blocked."
          exit 1
