name: Secret Scanning

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Fail on findings
        if: steps.gitleaks.outputs.exit-code != '0'
        run: |
          echo "::error::Gitleaks detected secrets. Revoke and rotate immediately."
          exit 1

  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  custom-patterns:
    name: Custom Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan custom patterns
        run: |
          set +e
          FOUND=0
          SAFE="example|placeholder|your_key_here|REPLACE_ME|redacted|REDACTED|test_token"
          declare -a patterns=("auth_token" "ct0" "apo_[a-zA-Z0-9]" "exa-[a-zA-Z0-9]" "gsk_[a-zA-Z0-9]" "ghp_[a-zA-Z0-9]" "github_pat_" "BEGIN.*PRIVATE KEY")
          for p in "${patterns[@]}"; do
            r=$(git log --all -p | grep -E "$p" | grep -vE "$SAFE" 2>/dev/null | head -3)
            if [ -n "$r" ]; then
              FOUND=1
              echo "::warning::Matched pattern: $p"
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "::error::Potential secrets found in git history. Check warnings above."
            exit 1
          fi
          echo "Custom scan passed."

  summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, trufflehog, custom-patterns]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "| Scanner | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${{ needs.gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TruffleHog | ${{ needs.trufflehog.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Custom Patterns | ${{ needs.custom-patterns.result }} |" >> $GITHUB_STEP_SUMMARY
      - name: Fail if any scanner failed
        if: needs.gitleaks.result == 'failure' || needs.trufflehog.result == 'failure' || needs.custom-patterns.result == 'failure'
        run: exit 1
